ai_usage_summary: |
  Used Antigravity (powered by Gemini) to analyze the competition requirements, extract data from docx files, build a React frontend with a FastAPI backend, and subsequently pivot to a fully offline vector-search Python script for the hackathon submission.

methodology_summary: |
  Two-stage offline pipeline. Stage 1 (Pre-computation) uses pandas to parse and flatten candidates.jsonl, extracting key behavioral signals and flagging honeypots. It then encodes all profiles using `all-MiniLM-L6-v2` into a FAISS-compatible numpy array, and uses the Gemini API offline to generate highly specific, non-templated reasoning strings for the top 500 candidates. Stage 2 (Ranking) loads the precomputed embeddings and parquet files, calculates cosine similarity against the job description, filters out honeypots, and computes a composite score (70% semantic match + 30% behavioral signals like notice period and activity). It then attaches the pre-computed LLM reasonings. Total ranking runtime is under 15 seconds.

